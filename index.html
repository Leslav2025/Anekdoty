<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анекдоти Удвох</title>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background: #0d0d0d; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .top-banner { width: 100%; max-width: 400px; border-radius: 10px; margin-bottom: 10px; }
        .tv-container { width: 100%; max-width: 500px; background: #4a2f1b; border-radius: 20px; border: 6px solid #2e1a0b; padding: 10px; box-sizing: border-box; }
        .tv-screen { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 10px; overflow: hidden; position: relative; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .donation-section { width: 100%; max-width: 500px; margin-top: 20px; text-align: center; }
        .donate-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .btn-bank { text-decoration: none; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 13px; color: white; flex: 1; text-align: center; }
        .mono { background: #000; border: 1px solid #444; color: #ff3b30; }
        .privat { background: #76b82a; }
        .idea { background: #ff0000; }
        #ton-connect-button { display: flex; justify-content: center; margin: 15px 0; }
        .ton-btn { background: #0088cc; color: white; border: none; padding: 15px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; box-shadow: 0 4px 15px rgba(0, 136, 204, 0.3); }
        .footer { color: #444; font-size: 11px; margin-top: 20px; padding-bottom: 20px; }
    </style>
</head>
<body>

    <img src="1775239832172.png" class="top-banner">

    <div class="tv-container">
        <div class="tv-screen">
            <iframe src="https://www.youtube.com/embed/videoseries?list=PLLM-qfBiUqa33GDk4pwgm4L00lRLsZTfF&autoplay=1&mute=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <div class="donation-section">
        <div class="donate-row">
            <a href="https://send.monobank.ua/jar/ALGbQ8CaYU" target="_blank" class="btn-bank mono">Монобанк</a>
            <a href="https://www.privat24.ua/send/i0qz3" target="_blank" class="btn-bank privat">Приват24</a>
            <a href="https://pay.obank.com.ua/payment?type=skrynka&uuid=4B45E725-F5D1-4BF6-9CDD-2E81C98074C7" target="_blank" class="btn-bank idea">O-Bank</a>
        </div>

        <div id="ton-connect-button"></div>
        <button class="ton-btn" id="ton-send-btn">ПІДТРИМАТИ TON 💎</button>
    </div>

    <div class="footer">© 2026 Канал "Удвох"</div>

    <script>
        // Чекаємо завантаження всього сайту
        window.addEventListener('load', () => {
            const tonConnectUI = new TONConnectUI.TonConnectUI({
                manifestUrl: 'https://leslav2025.github.io/Anekdoty/tonconnect-manifest.json',
                buttonRootId: 'ton-connect-button'
            });

            // Налаштовуємо кнопку
            const btn = document.getElementById('ton-send-btn');
            btn.onclick = async () => {
                try {
                    if (!tonConnectUI.connected) {
                        // Примусово відкриваємо меню гаманців
                        await tonConnectUI.openModal();
                    } else {
                        // Відправляємо 0.1 TON
                        const transaction = {
                            validUntil: Math.floor(Date.now() / 1000) + 300,
                            messages: [{
                                address: "UQDXq1iAqu88tVRG62_k03kAXELu_1gzRBMye-VZoFRIRtWw",
                                amount: "100000000"
                            }]
                        };
                        await tonConnectUI.sendTransaction(transaction);
                        alert("Дякуємо!");
                    }
                } catch (e) {
                    console.error("Error:", e);
                    // Якщо модалка не відкрилася через UI, пробуємо ще раз
                    tonConnectUI.modal.open();
                }
            };
        });
    </script>
</body>
</html>
