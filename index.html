<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анекдоти: Телевізор + TON</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background-color: #0d0d0d; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .top-banner { width: 100%; max-width: 500px; border-radius: 15px; margin-bottom: 10px; }
        h1 { font-size: 20px; color: #ff9900; text-align: center; margin: 10px 0 30px 0; text-transform: uppercase; }
        
        .tv-container { position: relative; width: 100%; max-width: 800px; background: #4a2f1b; border-radius: 20px; border: 8px solid #2e1a0b; padding: 10px; box-shadow: 0 10px 25px #000; margin-bottom: 15px; }
        .tv-screen { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 10px; overflow: hidden; border: 4px solid #1a1a1a; }
        #player { width: 100%; height: 100%; }
        
        .tv-controls { display: flex; justify-content: space-around; align-items: center; background: #331d0e; padding: 12px; border-radius: 10px; margin-top: 10px; border: 2px solid #2e1a0b; }
        .control-btn { background: #a67c52; border: 2px solid #5e412c; color: #fff; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* КНОПКА TON */
        #ton-connect-button { margin-top: 20px; }
        .donate-btn {
            margin-top: 15px;
            background: linear-gradient(45deg, #0088cc, #00aaff);
            color: #fff;
            padding: 12px 30px;
            border-radius: 50px;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.4);
        }
        .footer { color: #444; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>

    <img src="1775239832172.png" alt="Логотип" class="top-banner">
    <h1>Анекдоти від каналу Удвох</h1>

    <div class="tv-container">
        <div class="tv-screen"><div id="player"></div></div>
        <div class="tv-controls">
            <button class="control-btn" id="rewind">⏪ -10с</button>
            <button class="control-btn" id="play-pause">⏸️</button>
            <button class="control-btn" id="forward">+10с ⏩</button>
        </div>
    </div>

    <div id="ton-connect-button"></div>

    <button class="donate-btn" onclick="sendTransaction()">Підтримати канал (0.1 TON) 💎</button>

    <div class="footer">© 2026 Канал "Удвох"</div>

    <script>
        // Налаштування TON Connect
        const tonConnectUI = new TONConnectUI.TonConnectUI({
            manifestUrl: 'https://leslav2025.github.io/Anekdoty/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        async function sendTransaction() {
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 60,
                messages: [
                    {
                        address: "UQDXq1iAqu88tVRG62_k03kAXELu_1gzRBMye-VZoFRIRtWw", // Ваш гаманець
                        amount: "100000000" // 0.1 TON у нанотонах
                    }
                ]
            };

            try {
                await tonConnectUI.sendTransaction(transaction);
                alert("Дякуємо за підтримку!");
            } catch (e) {
                console.error(e);
            }
        }

        // YouTube Player
        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                playerVars: { listType:'playlist', list:'PLLM-qfBiUqa33GDk4pwgm4L00lRLsZTfF', autoplay:1, controls:0 },
                events: { 'onReady': onPlayerReady }
            });
        }
        function onPlayerReady() {
            document.getElementById('rewind').onclick = () => player.seekTo(player.getCurrentTime() - 10);
            document.getElementById('forward').onclick = () => player.seekTo(player.getCurrentTime() + 10);
            document.getElementById('play-pause').onclick = function() {
                if(player.getPlayerState()==1){player.pauseVideo();this.innerText="▶️";}
                else{player.playVideo();this.innerText="⏸️";}
            };
        }

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.body.appendChild(tag);
    </script>
</body>
</html>
