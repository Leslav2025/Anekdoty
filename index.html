<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Анекдоти Канал Удвох 📺</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background-color: #0d0d0d; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .top-banner { width: 100%; max-width: 400px; border-radius: 12px; margin-bottom: 10px; }
        
        .tv-container { width: 100%; max-width: 500px; background: #4a2f1b; border-radius: 20px; border: 6px solid #2e1a0b; padding: 10px; box-sizing: border-box; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .tv-screen { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 10px; overflow: hidden; position: relative; border: 2px solid #1a1108; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .donation-section { width: 100%; max-width: 500px; margin: 20px auto; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; box-sizing: border-box; border: 1px solid #333; }
        .donate-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .btn-bank { text-decoration: none; padding: 12px; border-radius: 10px; font-weight: bold; font-size: 12px; color: white; flex: 1; text-align: center; transition: 0.2s; }
        .mono { background: #000; border: 1px solid #333; color: #fff; border-bottom: 2px solid #ff3b30; }
        .privat { background: #76b82a; }
        .idea { background: #ff0000; }
        
        #ton-connect { display: flex; justify-content: center; margin: 15px 0; }
        
        #ton-actions { display: none; gap: 8px; justify-content: center; margin-top: 10px; }
        .btn-ton-quick { background: #0088cc; color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; flex: 1; font-size: 14px; }
        .btn-ton-quick:active { transform: scale(0.95); }

        .footer { margin-top: 20px; font-size: 11px; color: #475569; padding-bottom: 20px; }
    </style>
</head>
<body>

    <img src="1775239832172.png" class="top-banner">

    <div class="tv-container">
        <div class="tv-screen">
            <iframe src="https://www.youtube.com/embed/videoseries?list=PLLM-qfBiUqa33GDk4pwgm4L00lRLsZTfF" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <div class="donation-section">
        <div class="donate-row">
            <a href="https://send.monobank.ua/jar/ALGbQ8CaYU" target="_blank" class="btn-bank mono">Monobank</a>
            <a href="https://www.privat24.ua/send/i0qz3" target="_blank" class="btn-bank privat">Privat24</a>
            <a href="https://pay.obank.com.ua/payment?type=skrynka&uuid=4B45E725-F5D1-4BF6-9CDD-2E81C98074C7" target="_blank" class="btn-bank idea">O-Bank</a>
        </div>

        <div style="font-size: 12px; color: #888; margin-bottom: 10px; font-weight: bold; letter-spacing: 1px;">ПІДТРИМКА В TON 💎</div>
        
        <div id="ton-connect"></div>
        
        <div id="ton-actions">
            <button class="btn-ton-quick" onclick="sendTon(1)">1 TON</button>
            <button class="btn-ton-quick" onclick="sendTon(5)">5 TON</button>
            <button class="btn-ton-quick" onclick="sendTon(10)">10 TON</button>
        </div>
    </div>

    <div class="footer">© 2023-2026 Канал "Удвох" | Сміємось — значить перемагаємо!</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ВАШ ГАМАНЕЦЬ
        const MY_WALLET = "UQDXq1iAqu88tVRG62_k03kAXELu_1gzRBMye-VZoFRIRtWw";

        // ІНІЦІАЛІЗАЦІЯ TON CONNECT (ВИПРАВЛЕНО НАЗВУ)
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://leslav2025.github.io/Anekdoty/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        // ПЕРЕВІРКА СТАТУСУ ГАМАНЦЯ
        tonConnectUI.onStatusChange(wallet => {
            const actions = document.getElementById('ton-actions');
            if (wallet) {
                actions.style.display = 'flex'; // Показуємо кнопки донату
            } else {
                actions.style.display = 'none'; // Ховаємо, якщо не підключено
            }
        });

        async function sendTon(amount) {
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 300,
                messages: [{
                    address: MY_WALLET,
                    amount: (amount * 1000000000).toString() // Перерахунок у нанотони
                }]
            };
            try {
                const result = await tonConnectUI.sendTransaction(transaction);
                if (result) alert("Дякуємо за підтримку каналу! 😂💎");
            } catch (e) {
                console.error(e);
                alert("Транзакцію не завершено.");
            }
        }
    </script>
</body>
</html>
